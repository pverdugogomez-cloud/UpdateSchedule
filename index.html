<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pozas - Control de Avance Premium</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-primary: #3b82f6;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            min-height: 100vh;
        }

        h1, h2, h3, .font-outfit { font-family: 'Outfit', sans-serif; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.08);
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-bg {
            background: url('https://images.unsplash.com/photo-1541888946425-d81bb19480c5?auto=format&fit=crop&q=80&w=2070') no-repeat center center;
            background-size: cover;
        }

        .custom-range::-webkit-scrollbar { width: 6px; }
        .custom-range::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- DEFAULTS & CONFIG ---
        const INITIAL_ROLES = {
            ADMIN: 'admin',
            PROGRAMMER: 'programmer',
            SUPERVISOR: 'supervisor'
        };

        const DEFAULT_MAESTRO = {
            "Área": ["Área Norte", "Área Sur", "Área Central"],
            "Sistema": ["Sistema A", "Sistema B", "Drenaje"],
            "Familia": ["Movimiento de Tierra", "Obras Civiles", "Montaje"],
            "Poza": ["Poza 01", "Poza 02", "Poza 03", "Poza 04"],
            "Equipo": ["Excavadora CAT 336", "Camión Tolva 20m3", "Motoniveladora", "Retroexcavadora"],
            "Actividad": ["Pata de gallo", "Zanjas", "Acordonado", "Remonte", "Extracción", "Perfilado"]
        };

        // --- HELPERS ---
        const storage = {
            get: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
        };

        // --- UI COMPONENTS ---
        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass-card rounded-3xl p-8 ${className} animate-fade-in`}>
                {children}
            </div>
        );

        const Input = ({ label, icon, type="text", ...props }) => (
            <div className="mb-5">
                <label className="block text-sm font-bold text-gray-700 mb-1.5 flex items-center gap-2">
                    {icon && <i data-lucide={icon} className="w-4 h-4 text-blue-500"></i>}
                    {label}
                </label>
                <input 
                    type={type}
                    className="w-full bg-white/60 border border-gray-200 rounded-xl py-3 px-4 focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-100 transition-all text-gray-800 outline-none"
                    {...props}
                />
            </div>
        );

        const Select = ({ label, options, icon, ...props }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <div className="mb-5">
                    <label className="block text-sm font-bold text-gray-700 mb-1.5 flex items-center gap-2">
                        {icon && <i data-lucide={icon} className="w-4 h-4 text-blue-500"></i>}
                        {label}
                    </label>
                    <div className="relative">
                        <select 
                            className="w-full bg-white/60 border border-gray-200 rounded-xl py-3 px-4 focus:bg-white focus:border-blue-400 transition-all text-gray-800 appearance-none cursor-pointer outline-none"
                            {...props}
                        >
                            <option value="">Seleccionar...</option>
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                        <i data-lucide="chevron-down" className="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>
            );
        };

        // --- VIEWS ---

        const Login = ({ onLogin }) => {
            const [user, setUser] = useState("");
            const [pass, setPass] = useState("");
            
            const handleLogin = (e) => {
                e.preventDefault();
                const users = storage.get('pozas_users', [
                    { user: 'admin', pass: 'admin123', role: 'admin', name: 'Administrador Boss' },
                    { user: 'progra', pass: 'p123', role: 'programmer', name: 'Juan Programador' },
                    { user: 'terreno', pass: 't123', role: 'supervisor', name: 'Pedro Terreno' }
                ]);
                const found = users.find(u => u.user === user && u.pass === pass);
                if (found) onLogin(found);
                else alert("Credenciales incorrectas");
            };

            return (
                <div className="min-h-screen flex items-center justify-center login-bg p-6">
                    <div className="absolute inset-0 bg-blue-900/40 backdrop-blur-sm"></div>
                    <GlassCard className="max-w-md w-full relative z-10 !bg-white/90">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-2xl mx-auto mb-6 transform rotate-6">
                                <i data-lucide="hard-hat" className="w-10 h-10 text-white"></i>
                            </div>
                            <h1 className="text-4xl font-bold text-gray-900 tracking-tight mb-2">Pozas Control</h1>
                            <p className="text-gray-500 font-medium">Salar de Atacama | Acceso al Sistema</p>
                        </div>
                        <form onSubmit={handleLogin}>
                            <Input label="Usuario" icon="user" value={user} onChange={e => setUser(e.target.value)} />
                            <Input label="Contraseña" icon="lock" type="password" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 mt-4">
                                Ingresar al Sistema
                            </button>
                        </form>
                    </GlassCard>
                </div>
            );
        };

        const AdminPanel = ({ maestro, setMaestro }) => {
            const [users, setUsers] = useState(storage.get('pozas_users', []));
            const [newUser, setNewUser] = useState({ user:'', pass:'', role:'supervisor', name:'' });
            const [newItem, setNewItem] = useState({ category:'Equipo', name:'' });

            const addUser = () => {
                if(!newUser.user || !newUser.pass) return;
                const updated = [...users, newUser];
                setUsers(updated);
                storage.set('pozas_users', updated);
                setNewUser({ user:'', pass:'', role:'supervisor', name:'' });
            };

            const addMaestroItem = () => {
                if(!newItem.name) return;
                const updated = { ...maestro, [newItem.category]: [...maestro[newItem.category], newItem.name] };
                setMaestro(updated);
                storage.set('pozas_maestro', updated);
                setNewItem({ ...newItem, name:'' });
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <GlassCard>
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-2">
                            <i data-lucide="users" className="text-blue-500"></i> Gestión de Usuarios
                        </h2>
                        <div className="space-y-4 mb-8">
                            <Input label="Nombre Real" value={newUser.name} onChange={e => setNewUser({...newUser, name: e.target.value})} />
                            <Input label="Username" value={newUser.user} onChange={e => setNewUser({...newUser, user: e.target.value})} />
                            <Input label="Password" type="password" value={newUser.pass} onChange={e => setNewUser({...newUser, pass: e.target.value})} />
                            <Select label="Perfil" options={['admin', 'programmer', 'supervisor']} value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})} />
                            <button onClick={addUser} className="w-full bg-blue-500 text-white py-3 rounded-xl font-bold">Crear Usuario</button>
                        </div>
                        <div className="max-h-60 overflow-y-auto border-t pt-4">
                            {users.map((u, i) => (
                                <div key={i} className="flex justify-between items-center p-3 hover:bg-white/40 rounded-lg">
                                    <div><p className="font-bold">{u.name}</p><p className="text-xs text-gray-500">{u.user} | {u.role}</p></div>
                                    <button onClick={() => {
                                        const filtered = users.filter((_, idx)=> idx !== i);
                                        setUsers(filtered); storage.set('pozas_users', filtered);
                                    }} className="text-red-400 hover:text-red-600"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                </div>
                            ))}
                        </div>
                    </GlassCard>

                    <GlassCard>
                        <h2 className="text-2xl font-bold mb-6 flex items-center gap-2">
                            <i data-lucide="database" className="text-indigo-500"></i> Maestro de Datos (Equipos/Pozas)
                        </h2>
                        <div className="flex gap-4 mb-6">
                            <Select label="Categoría" className="flex-1" options={Object.keys(maestro)} value={newItem.category} onChange={e => setNewItem({...newItem, category: e.target.value})} />
                            <div className="flex-[2]">
                                <Input label="Nombre del Item" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} />
                            </div>
                        </div>
                        <button onClick={addMaestroItem} className="w-full bg-indigo-500 text-white py-3 rounded-xl font-bold mb-6">Agregar al Maestro</button>
                        
                        <div className="grid grid-cols-2 gap-4 max-h-80 overflow-y-auto pr-2 custom-range">
                            {Object.entries(maestro).map(([cat, items]) => (
                                <div key={cat} className="p-4 bg-white/40 rounded-2xl">
                                    <h4 className="font-bold text-xs uppercase text-indigo-500 mb-2">{cat}</h4>
                                    <p className="text-sm">{items.length} items registrados</p>
                                </div>
                            ))}
                        </div>
                    </GlassCard>
                </div>
            );
        };

        // --- MASTER APP ---
        const App = () => {
            const [currentUser, setCurrentUser] = useState(storage.get('pozas_session', null));
            const [view, setView] = useState('form');
            const [maestro, setMaestro] = useState(storage.get('pozas_maestro', DEFAULT_MAESTRO));
            const [records, setRecords] = useState(storage.get('pozas_records', []));
            const [formData, setFormData] = useState({ Area: '', Sistema: '', Familia: '', Poza: '', Actividad: '', Porcentaje_Avance: 50, Equipos: [] });

            // Chart Logic
            useEffect(() => {
                if (view === 'dashboard' && records.length > 0) {
                    const ctx = document.getElementById('mainChart').getContext('2d');
                    const stats = {};
                    records.forEach(r => {
                        if (!stats[r.Familia]) stats[r.Familia] = { sum: 0, count: 0 };
                        stats[r.Familia].sum += Number(r.Porcentaje_Avance);
                        stats[r.Familia].count++;
                    });
                    
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: Object.keys(stats),
                            datasets: [{
                                label: '% Avance Promedio',
                                data: Object.values(stats).map(s => (s.sum / s.count).toFixed(1)),
                                backgroundColor: 'rgba(59, 130, 246, 0.6)',
                                borderRadius: 12
                            }]
                        },
                        options: { maintainAspectRatio: false }
                    });
                }
            }, [view, records]);

            const handleSubmit = (e) => {
                e.preventDefault();
                const newRecord = { ...formData, id: Date.now(), fecha: new Date().toLocaleDateString() };
                const updated = [newRecord, ...records];
                setRecords(updated);
                storage.set('pozas_records', updated);
                setFormData({ Area: '', Sistema: '', Familia: '', Poza: '', Actividad: '', Porcentaje_Avance: 50, Equipos: [] });
                alert("Registro guardado!");
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('pozas_session');
            };

            const handleLogin = (user) => {
                setCurrentUser(user);
                storage.set('pozas_session', user);
                // Redirect based on role
                if(user.role === 'programmer') setView('dashboard');
                else if(user.role === 'admin') setView('admin');
                else setView('form');
            };

            if (!currentUser) return <Login onLogin={handleLogin} />;

            return (
                <div className="max-w-7xl mx-auto px-6 py-6 font-inter">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-xl transform skew-x-1">
                                <i data-lucide="hard-hat" className="w-8 h-8 text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-3xl font-black text-gray-900 tracking-tight leading-none">PozasControl</h1>
                                <p className="text-blue-600 font-bold text-[10px] tracking-[0.2em] uppercase mt-1">Excon S.A | Salar de Atacama</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-6">
                            <nav className="flex bg-white/50 p-1.5 rounded-2xl glass-card border-none shadow-sm">
                                {currentUser.role !== 'programmer' && (
                                    <button onClick={() => setView('form')} className={`px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all ${view === 'form' ? 'bg-white shadow-md text-blue-600 translate-y-[-1px]' : 'text-gray-500'}`}>
                                        <i data-lucide="edit-3" className="w-4 h-4"></i> Terreno
                                    </button>
                                )}
                                {currentUser.role !== 'supervisor' && (
                                    <button onClick={() => setView('dashboard')} className={`px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all ${view === 'dashboard' ? 'bg-white shadow-md text-blue-600 translate-y-[-1px]' : 'text-gray-500'}`}>
                                        <i data-lucide="bar-chart-3" className="w-4 h-4"></i> Dashboard
                                    </button>
                                )}
                                {currentUser.role === 'admin' && (
                                    <button onClick={() => setView('admin')} className={`px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all ${view === 'admin' ? 'bg-white shadow-md text-indigo-600 translate-y-[-1px]' : 'text-gray-500'}`}>
                                        <i data-lucide="shield-check" className="w-4 h-4"></i> Admin
                                    </button>
                                )}
                            </nav>
                            
                            <div className="flex items-center gap-4 bg-white/40 pl-4 py-1 pr-1 rounded-2xl border border-white/40">
                                <div className="text-right">
                                    <p className="text-xs font-black text-gray-800">{currentUser.name}</p>
                                    <p className="text-[10px] text-gray-500 uppercase tracking-widest">{currentUser.role}</p>
                                </div>
                                <button onClick={handleLogout} className="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                                    <i data-lucide="log-out" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main>
                        {view === 'admin' && <AdminPanel maestro={maestro} setMaestro={setMaestro} />}
                        
                        {view === 'form' && (
                            <div className="max-w-2xl mx-auto">
                                <GlassCard>
                                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2">
                                        <i data-lucide="clipboard-list" className="text-blue-500"></i> Registro de Avance
                                    </h2>
                                    <div className="grid grid-cols-2 gap-x-6">
                                        <Select label="Área de Trabajo" icon="map" options={maestro["Área"]} />
                                        <Select label="Sistema" icon="layers" options={maestro["Sistema"]} />
                                        <Select label="Familia" icon="folder" options={maestro["Familia"]} />
                                        <Select label="Poza" icon="droplets" options={maestro["Poza"]} />
                                    </div>
                                    <hr className="my-6 border-white/20" />
                                    <Select label="Actividad" icon="activity" options={maestro["Actividad"]} />
                                    <div className="mb-8">
                                        <label className="block text-sm font-bold text-gray-700 mb-4 flex justify-between">
                                            <span>Porcentaje de Avance</span>
                                            <span className="text-blue-600 text-lg font-black">75%</span>
                                        </label>
                                        <input type="range" className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                    </div>
                                    <div className="mb-6">
                                        <label className="block text-sm font-bold text-gray-700 mb-3">Equipos involucrados</label>
                                        <div className="flex flex-wrap gap-2">
                                            {maestro["Equipo"].map(e => {
                                                const isSelected = formData.Equipos?.includes(e);
                                                return (
                                                    <button 
                                                        key={e} 
                                                        type="button"
                                                        onClick={() => {
                                                            const current = formData.Equipos || [];
                                                            const updated = isSelected ? current.filter(x => x !== e) : [...current, e];
                                                            setFormData({...formData, Equipos: updated});
                                                        }}
                                                        className={`px-4 py-2 border rounded-xl text-sm font-medium transition-all ${isSelected ? 'bg-blue-600 border-blue-700 text-white shadow-md' : 'bg-white/50 border-gray-200 hover:border-blue-400'}`}
                                                    >
                                                        {e}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <button className="w-full bg-blue-600 py-4 rounded-2xl text-white font-bold text-lg shadow-2xl hover:bg-blue-700 transition-all flex items-center justify-center gap-3">
                                        <i data-lucide="save" className="w-6 h-6"></i> Guardar Avance
                                    </button>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <GlassCard className="text-center p-6">
                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Avance Total</p>
                                        <p className="text-4xl font-black text-blue-600">68.4%</p>
                                    </GlassCard>
                                    <GlassCard className="text-center p-6">
                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Pozas Activas</p>
                                        <p className="text-4xl font-black text-indigo-600">12</p>
                                    </GlassCard>
                                    <GlassCard className="text-center p-6">
                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Hitos Logrados</p>
                                        <p className="text-4xl font-black text-green-600">04</p>
                                    </GlassCard>
                                    <GlassCard className="text-center p-6">
                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Sincronización Cloud</p>
                                        <div className="flex items-center justify-center gap-2 text-green-500">
                                            <i data-lucide="cloud-check" className="w-6 h-6"></i>
                                            <span className="font-black">Online</span>
                                        </div>
                                    </GlassCard>
                                </div>
                                
                                <GlassCard className="h-[450px]">
                                    <h3 className="text-xl font-bold mb-6">Avance por Familia de Trabajo</h3>
                                    <div className="h-80">
                                        <canvas id="mainChart"></canvas>
                                    </div>
                                </GlassCard>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-10 border-t border-white/20 text-center">
                        <p className="text-gray-500 text-xs font-medium tracking-widest uppercase">
                            © 2026 Constructora Excon S.A | Powered by Antigravity AI
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
