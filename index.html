                    setTimeout(() => syncRecords(), 2000); // Sincronización con delay
                    setFormData({ ...formData, Poza: '', Actividad: '', Porcentaje_Avance: 0, Equipos: [], EquiposDetalle: [], tipoEquipo: 'Todos', Observaciones: '' });
                    alert(isUpdate ? "Registro actualizado correctamente." : "Operación exitosa y sincronizada.");
                } catch (e) {
                    console.error("Save Error:", e);
                    alert("Error al guardar el registro.");
                } finally {
                    setSaving(false);
                }
            };

            if (!currentUser) return <Login onLogin={handleLogin} />;

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 sm:py-6 pb-20">
                    {selectedPozaHist && (
                        <HistoryModal
                            poza={selectedPozaHist}
                            records={records}
                            metas={metas}
                            onSaveMeta={(act, tipo, val) => {
                                lastMetasUpdate.current = Date.now();
                                const newMeta = { Poza: selectedPozaHist, Actividad: act, TipoEquipo: tipo, Meta: val };
                                api.send('upsert_meta', newMeta);
                                setMetas(prev => {
                                    const idx = prev.findIndex(m => m.Poza === selectedPozaHist && m.Actividad === act && m.TipoEquipo === tipo);
                                    if (idx !== -1) {
                                        const updated = [...prev];
                                        updated[idx] = newMeta;
                                        return updated;
                                    }
                                    return [...prev, newMeta];
                                });
                            }}
                            onDelete={(ts) => deleteRecord(ts)}
                            onClose={() => setSelectedPozaHist(null)}
                        />
                    )}
                    <header className="flex flex-col lg:flex-row justify-between items-center mb-8 lg:mb-10 gap-6">
                        <div className="flex items-center gap-4 cursor-pointer self-start lg:self-center" onClick={() => setView(currentUser.role === 'programmer' ? 'dashboard' : 'form')}>
                            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl border border-white/20 shrink-0">
                                <i data-lucide="hard-hat" className="w-6 h-6 text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-xl sm:text-2xl font-black text-gray-900 tracking-tight leading-none font-outfit">PozasControl</h1>
                                <p className="text-blue-600 font-bold text-[7px] sm:text-[8px] tracking-[0.2em] sm:tracking-[0.3em] uppercase mt-1">Salar de Atacama | Digital Twin</p>
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center gap-4 w-full lg:w-auto">
                            <nav className="flex bg-white/40 p-1.5 rounded-2xl border border-white/40 shadow-sm w-full sm:w-auto justify-center">
                                {can(currentUser, 'ver_ingreso') && <button onClick={() => setView('form')} className={`flex-1 sm:flex-none px-4 sm:px-6 py-2.5 rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest transition-all ${view === 'form' ? 'bg-white shadow-md text-blue-600' : 'text-gray-500'}`}>Ingreso</button>}
                                {can(currentUser, 'ver_dashboard') && <button onClick={() => setView('dashboard')} className={`flex-1 sm:flex-none px-4 sm:px-6 py-2.5 rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest transition-all ${view === 'dashboard' ? 'bg-white shadow-md text-blue-600' : 'text-gray-500'}`}>Dashboard</button>}
                                {can(currentUser, 'gestionar_usuarios') && (
                                    <button onClick={() => setView('admin')} className={`flex-1 sm:flex-none px-4 sm:px-6 py-2.5 rounded-xl text-[10px] sm:text-xs font-black uppercase tracking-widest transition-all ${view === 'admin' ? 'bg-white shadow-md text-indigo-600' : 'text-gray-500'}`}>Usuarios</button>
                                )}
                            </nav>

                            <div className="flex items-center gap-3 sm:gap-4 bg-white/40 pl-3 sm:pl-4 py-1.5 pr-1.5 rounded-2xl border border-white/40 w-full sm:w-auto justify-between sm:justify-start">
                                <div className="text-right">
                                    <p className="text-[10px] font-black text-gray-900 uppercase leading-none">{currentUser.name}</p>
                                    <p className="text-[8px] text-blue-500 font-black uppercase tracking-widest mt-1 opacity-60">{currentUser.cargo}</p>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-xl flex items-center justify-center font-black text-xs shadow-md cursor-pointer group" onClick={() => setView('profile')}>
                                        <span className="group-hover:scale-110 transition-transform">{currentUser.name.charAt(0)}</span>
                                    </div>
                                    <button onClick={handleLogout} className="w-8 h-8 bg-black/5 text-black/40 rounded-lg flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                                        <i data-lucide="log-out" className="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>
                    <main>
                        {view === 'admin' && <AdminPanel users={users} setUsers={setUsers} syncRecords={syncRecords} />}
                        {view === 'profile' && (
                            <div className="max-w-md mx-auto animate-fade-in">
                                <GlassCard className="!bg-white/95">
                                    <h2 className="text-2xl font-black mb-6 font-outfit">Mi Perfil</h2>
                                    <div className="mb-8 space-y-4 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                                        <div>
                                            <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Nombre Completo</p>
                                            <p className="text-lg font-black text-gray-900 leading-none">{currentUser.name}</p>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Cargo</p>
                                            <p className="text-sm font-bold text-gray-700">{currentUser.cargo}</p>
                                        </div>
                                        <div className="flex justify-between">
                                            <div>
                                                <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Email</p>
                                                <p className="text-xs font-bold text-gray-500">{currentUser.mail}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Teléfono</p>
                                                <p className="text-xs font-bold text-gray-500">{currentUser.telefono}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-gray-100">
                                        <h3 className="text-xs font-black uppercase tracking-widest text-gray-400 mb-4">Seguridad</h3>
                                        <Input label="Nueva Contraseña" type="password" />
                                        <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest mt-2 shadow-xl hover:bg-blue-700 transition-all active:scale-95">Actualizar Clave</button>
                                    </div>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'form' && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <GlassCard className="!bg-white/90 shadow-2xl">
                                    <div className="mb-10 flex items-center gap-6">
                                        <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center shadow-inner text-blue-600">
                                            <i data-lucide={editingRecord ? "edit-3" : "plus-circle"} className="w-8 h-8"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black text-gray-900 font-outfit leading-none mb-2">{editingRecord ? "Modificar Avance" : "Carga de Avance"}</h2>
                                            <p className="text-blue-600 text-[10px] font-black uppercase tracking-[0.3em] leading-none">Turno Operativo | {new Date().toLocaleDateString()}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <Input label="1. Fecha de Faena" type="date" value={formData.fecha} onChange={e => setFormData({ ...formData, fecha: e.target.value })} icon="calendar" />
                                        <SearchableSelect label="2. Localización (Poza)" options={maestro["Poza"]} value={formData.Poza} onChange={val => setFormData({ ...formData, Poza: val })} icon="map-pin" placeholder="Buscar por ID (Ej: 1-A)..." allowCreate={true} onCreate={createNewPoza} />

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                                            <SearchableSelect label="3. Actividad en Curso" options={maestro.Actividad && maestro.Actividad.length > 0 ? maestro.Actividad : ALL_ACTIVITIES} value={formData.Actividad} onChange={val => setFormData({ ...formData, Actividad: val })} icon="activity" placeholder="Seleccionar labor..." />
                                            <div className="mb-4 bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest">Ejecución</span>
                                                    <span className={`text-xl font-black ${formData.Porcentaje_Avance == 100 ? 'text-green-600' : 'text-blue-600'}`}>{formData.Porcentaje_Avance}%</span>
                                                </div>
                                                <input type="range" min="0" max="100" value={formData.Porcentaje_Avance} onChange={e => setFormData({ ...formData, Porcentaje_Avance: parseInt(e.target.value) })} className={`w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer ${formData.Porcentaje_Avance == 100 ? 'accent-green-600' : 'accent-blue-600'}`} />
                                                {formData.Porcentaje_Avance < prevProgress && (
                                                    <p className="text-[9px] font-black text-red-500 mt-3 flex items-center gap-1.5 animate-pulse uppercase tracking-tighter">
                                                        <i data-lucide="alert-triangle" className="w-3 h-3"></i>
                                                        Avance menor al anterior registrado ({prevProgress}%)
                                                    </p>
                                                )}
                                            </div>
                                        </div>

                                        <div className="pt-6 border-t border-gray-100">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <Select label="4. Filtrar por Tipo de Equipo" options={["Todos", ...maestro.TiposEquipos]} value={formData.tipoEquipo} onChange={e => setFormData({ ...formData, tipoEquipo: e.target.value })} icon="filter" />
                                                <MultiSearchableSelect
                                                    label="5. Seleccionar Activos"
                                                    options={maestro.Equipo.filter(e => formData.tipoEquipo === "Todos" || e.includes(`(${formData.tipoEquipo})`))}
                                                    value={formData.Equipos}
                                                    onChange={val => setFormData({ ...formData, Equipos: val })}
                                                    icon="truck"
                                                />
                                                {formData.EquiposDetalle.length > 0 && (
                                                    <div className="col-span-full mt-4 p-5 bg-gradient-to-br from-blue-50/50 to-indigo-50/50 rounded-3xl border border-blue-100/50 animate-fade-in">
                                                        <div className="flex items-center gap-3 mb-4">
                                                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg">
                                                                <i data-lucide="clock" className="w-4 h-4 text-white"></i>
                                                            </div>
                                                            <p className="text-[10px] font-black text-blue-700 uppercase tracking-widest">Registrar Horas de Equipos</p>
                                                        </div>
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                                            {formData.EquiposDetalle.map((det, idx) => (
                                                                <div key={det.equipo} className="flex bg-white/80 backdrop-blur-sm p-3 rounded-2xl border border-white shadow-sm hover:shadow-md transition-all items-center gap-3 group">
                                                                    <div className="flex-1 min-w-0">
                                                                        <p className="text-[9px] font-black text-gray-400 uppercase tracking-tight truncate leading-none mb-1">{det.equipo.includes('(') ? det.equipo.split('(')[1].replace(')', '') : 'Otro'}</p>
                                                                        <p className="text-[11px] font-bold text-gray-700 truncate leading-none">{det.equipo.split(' (')[0]}</p>
                                                                    </div>
                                                                    <div className="relative">
                                                                        <input
                                                                            type="number"
                                                                            step="0.5"
                                                                            min="0"
                                                                            placeholder="0.0"
                                                                            className="w-16 bg-blue-50 border-none rounded-xl px-2 py-2 text-xs font-black text-blue-600 text-center outline-none focus:ring-4 focus:ring-blue-100 transition-all"
                                                                            value={det.horas || ''}
                                                                            onChange={(e) => {
                                                                                const newDet = [...formData.EquiposDetalle];
                                                                                newDet[idx].horas = parseFloat(e.target.value) || 0;
                                                                                setFormData({ ...formData, EquiposDetalle: newDet });
                                                                            }}
                                                                        />
                                                                        <span className="absolute -top-2 -right-1 bg-blue-600 text-[8px] text-white px-1.5 rounded-full font-black">Hr</span>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="mb-4">
                                            <label className="block text-xs font-black text-gray-500 uppercase mb-1.5 flex items-center gap-2 tracking-widest leading-none">
                                                <i data-lucide="message-square" className="w-3.5 h-3.5 text-blue-500"></i>
                                                6. Observaciones o Comentarios
                                            </label>
                                            <textarea
                                                className="w-full bg-white/60 border border-gray-200 rounded-xl py-2.5 px-4 focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-100 transition-all text-sm text-gray-800 outline-none min-h-[100px]"
                                                placeholder="Agregar detalles adicionales aquí..."
                                                value={formData.Observaciones}
                                                onChange={e => setFormData({ ...formData, Observaciones: e.target.value })}
                                            ></textarea>
                                        </div>

                                        <button 
                                            onClick={saveAvance} 
                                            disabled={saving}
                                            className={`w-full text-white py-6 rounded-3xl font-black uppercase text-xl tracking-[0.2em] shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-4 mt-8 ${saving ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                        >
                                            {saving ? (
                                                <>
                                                    <i data-lucide="loader-2" className="w-6 h-6 animate-spin"></i>
                                                    Guardando...
                                                </>
                                            ) : (
                                                <>
                                                    <i data-lucide="save" className="w-6 h-6"></i>
                                                    {editingRecord ? "Actualizar Registro" : "Grabar Avance"}
                                                </>
                                            )}
                                        </button>
                                        {editingRecord && <button onClick={() => { setEditingRecord(null); setFormData({ fecha: new Date().toISOString().split('T')[0], Poza: '', Actividad: '', Porcentaje_Avance: 0, Equipos: [], tipoEquipo: 'Todos', Observaciones: '' }); }} className="w-full text-xs font-black uppercase text-gray-400 py-2">Cancelar Edición</button>}
                                    </div>
                                </GlassCard>

                                <div className="space-y-4">
                                    <h3 className="text-xs font-black uppercase tracking-widest text-gray-400 px-2">Mis Cargas Recientes</h3>
                                    {records.filter(r => r.userName === currentUser.name).slice(0, 5).map(r => (
                                        <div key={r.timestamp} className="bg-white/60 p-4 rounded-2xl flex justify-between items-center border border-white px-6 shadow-sm">
                                            <div>
                                                <p className="text-xs font-black text-gray-900 uppercase">{r.Poza} - {r.Actividad}</p>
                                                <p className="text-[10px] text-gray-400 font-bold uppercase">{r.fecha} | {r.Porcentaje_Avance}%</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => editRecord(r)} className="p-2 text-blue-400 hover:text-blue-600 transition-colors"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                <button onClick={() => deleteRecord(r.timestamp)} className="p-2 text-red-200 hover:text-red-600 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {view === 'dashboard' && <DashboardView records={records} onEdit={editRecord} onDelete={deleteRecord} currentUser={currentUser} setSelectedPozaHist={setSelectedPozaHist} />}
                    </main>

                    <footer className="mt-20 py-10 border-t border-white/20 text-center">
                        <p className="text-gray-900 text-[9px] font-black tracking-[0.4em] uppercase opacity-30">
                            © 2026 Constructora Excon S.A | Digital Twin Platform | v2.5.0
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
