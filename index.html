    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);

            --accent-primary: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.08);
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-bg {
            background: url('https://images.unsplash.com/photo-1541888946425-d81bb1946425-d81bb19480c5?auto=format&fit=crop&q=80&w=2070') no-repeat center center;
            background-size: cover;
        }

        .custom-range::-webkit-scrollbar {
            width: 6px;
        }

        .custom-range::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        body:hover .custom-range::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
        }

        @media print {

            /* 1. Resetear visibilidad */
            html,
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                height: auto !important;
                min-height: auto !important;
                overflow: visible !important;
                display: block !important;
            }

            /* 2. Ocultar de forma absoluta todo el árbol de React */
            #root>div>*:not(.print-modal-container) {
                display: none !important;
            }

            /* 3. Asegurar que el contenedor del modal cubra la página */
            .print-modal-container {
                position: static !important; /* Cambiar a static para que el flujo de página funcione */
                display: block !important;
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                height: auto !important;
                width: 100% !important;
            }

            /* 4. Estilo del contenido del reporte */
            .print-content {
                display: block !important;
                background: white !important;
                width: 100% !important;
                max-width: 100% !important;
                max-height: none !important; /* Quitar límite de altura */
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                overflow: visible !important;
                height: auto !important;
            }

            /* 5. Asegurar limpieza de estilos interactivos */
            .no-print,
            button,
            nav {
                display: none !important;
            }

            .animate-fade-in {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
                display: block !important;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                box-shadow: none !important;
                text-shadow: none !important;
                backdrop-filter: none !important;
                overflow: visible !important;
            }

            .print-content * {
                overflow: visible !important;
            }

            .split-print {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .grid {
                display: grid !important;
            }
        }

        .searchable-results {
            max-height: 250px;
            overflow-y: auto;
            position: absolute;
            width: 100%;
            z-index: 50;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            margin-top: 0.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>

        const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxYfNpTNLZmR2KxGaUn0F-eU2oSAiYHv72YujGLNwCRkgR_S42Xgjn4IRR01USNFSCw/exec";


        // --- HELPERS ---
        const storage = {
            get: (key, def) => JSON.parse(localStorage.getItem(key)) || def,
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
        };

        const api = {
            async list() {
                try {
                    const res = await fetch(`${SHEETS_URL}?_=${new Date().getTime()}`);
                    const data = await res.json();
                    console.log("DEBUG: Raw data from API (first 2 records):", data.slice(0, 2));
                    if (!Array.isArray(data)) return [];
                    const mapped = data.map(r => ({
                        timestamp: r.timestamp || r.Timestamp || r.ID || new Date().getTime(),
                        fecha: (r.fecha || r.Fecha || "").toString().split('T')[0],
                        Poza: r.Poza || r.Area || r.AREA || "",
                        Actividad: r.Actividad || "",
                        Porcentaje_Avance: r.Porcentaje_Avance !== undefined ? r.Porcentaje_Avance : (r.Avance !== undefined ? r.Avance : 0),
                        Equipos: (() => {
                            if (Array.isArray(r.Equipos)) return r.Equipos;
                            if (typeof r.Equipos === 'string' && r.Equipos.startsWith('[')) {
                                try { return JSON.parse(r.Equipos); } catch (e) { return [r.Equipos]; }
                            }
                            return r.Equipos ? [r.Equipos] : [];
                        })(),
                        userName: r.userName || r.Usuario || "Sistema",
                        userCargo: r.userCargo || r.Cargo || "",
                        Observaciones: r.Observaciones || r.observaciones || r.OBSERVACIONES || r.comentarios || r.Comentarios || "",
                        proyecto_id: r.proyecto_id || r.Proyecto_ID || "",
                        EquiposDetalle: (() => {
                            if (Array.isArray(r.EquiposDetalle)) return r.EquiposDetalle;
                            if (typeof r.EquiposDetalle === 'string' && r.EquiposDetalle.startsWith('[')) {
                                try { return JSON.parse(r.EquiposDetalle); } catch (e) { return []; }
                            }
                            return r.EquiposDetalle || [];
                        })()
                    }));
                    console.log("DEBUG: Mapped records (first 2):", mapped.slice(0, 2));
                    return mapped;
                } catch (e) { console.error("API Error (list):", e); return null; }
            },
            async listMaestro() {
                try {
                    const res = await fetch(`${SHEETS_URL}?type=maestro&_=${new Date().getTime()}`);
                    const data = await res.json();
                    return (data && typeof data === 'object') ? data : null;
                } catch (e) { console.error("API Error (listMaestro):", e); return null; }
            },
            async listMetas() {
                try {
                    const res = await fetch(`${SHEETS_URL}?type=metas&_=${new Date().getTime()}`);
                    const data = await res.json();
                    return Array.isArray(data) ? data : [];
                } catch (e) { console.error("API Error (listMetas):", e); return []; }
            },
            async listUsers() {
                try {
                    const res = await fetch(`${SHEETS_URL}?type=usuarios&_=${new Date().getTime()}`);
                    const data = await res.json();
                    if (!Array.isArray(data)) return null;
                    return data.map(u => ({
                        ...u,
                        permisos: (() => {
                            // Buscar datos JSON en todas las fuentes posibles
                            const candidates = [u.permisos, u.permiso, u.role, u.rol];
                            for (const p of candidates) {
                                if (p && typeof p === 'object') return p;
                                if (typeof p === 'string' && p.trim().startsWith('{')) {
                                    try {
                                        const parsed = JSON.parse(p);
                                        if (parsed && typeof parsed === 'object') return parsed;
                                    } catch (e) { }
                                }
                            }

                            // Si no hay JSON, mapear roles antiguos por palabras clave
                            const r = (u.role || u.rol || "").toString().toLowerCase().trim();
                            if (r === 'admin') return { ...PRESETS.admin };
                            if (r === 'programmer' || r === 'programador') return { ...PRESETS.programador };
                            if (r === 'visitor' || r === 'solo_vista') return { ...PRESETS.solo_vista };
                            return { ...PRESETS.supervisor };
                        })()
                    }));
                } catch (e) { console.error("API Error (listUsers):", e); return null; }
            },
            async send(action, data) {
                try {
                    console.log(`Sending action: ${action}`, data);
                    const params = new URLSearchParams();
                    params.append('data', JSON.stringify({ action, ...data }));
                    await fetch(SHEETS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params
                    });
                    return true;
                } catch (e) { console.error("API Error (send):", e); return false; }
            }
        };


        // --- COMPONENTS ---
        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass-card rounded-3xl p-8 ${className} animate-fade-in`}>
                {children}
            </div>
        );

        const Input = ({ label, icon, type = "text", ...props }) => (
            <div className="mb-4">
                <label className="block text-xs font-black text-gray-500 uppercase mb-1.5 flex items-center gap-2 tracking-widest leading-none">
                    {icon && <i data-lucide={icon} className="w-3.5 h-3.5 text-blue-500"></i>}
                    {label}
                </label>
                <input
                    type={type}
                    className="w-full bg-white/60 border border-gray-200 rounded-xl py-2.5 px-4 focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-100 transition-all text-sm text-gray-800 outline-none"
                    {...props}
                />
            </div>
        );

        const Select = ({ label, options, icon, ...props }) => (
            <div className="mb-4">
                <label className="block text-xs font-black text-gray-500 uppercase mb-1.5 flex items-center gap-2 tracking-widest leading-none">
                    {icon && <i data-lucide={icon} className="w-3.5 h-3.5 text-blue-500"></i>}
                    {label}
                </label>
                <div className="relative">
                    <select
                        className="w-full bg-white/60 border border-gray-200 rounded-xl py-2.5 px-4 focus:bg-white focus:border-blue-400 transition-all text-sm text-gray-800 appearance-none cursor-pointer outline-none"
                        {...props}
                    >
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                    <i data-lucide="chevron-down" className="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                </div>
            </div>
        );

        const SearchableSelect = ({ label, options, value, onChange, icon, placeholder = "Buscar...", allowCreate = false, onCreate }) => {
            const [query, setQuery] = useState(value || "");
            const [show, setShow] = useState(false);
            const containerRef = useRef(null);
            const filtered = options.filter(opt => opt.toLowerCase().includes(query.toLowerCase()));

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (containerRef.current && !containerRef.current.contains(event.target)) {
                        setShow(false);
                        setQuery(value || "");
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [value]);

            const handleSelect = (opt) => {
                onChange(opt);
                setQuery(opt);
                setShow(false);
            };

            return (
                <div className="mb-4 relative" ref={containerRef}>
                    <label className="block text-xs font-black text-gray-500 uppercase mb-1.5 flex items-center gap-2 tracking-widest leading-none">
                        {icon && <i data-lucide={icon} className="w-3.5 h-3.5 text-blue-500"></i>}
                        {label}
                    </label>
                    <input
                        type="text"
                        placeholder={placeholder}
                        value={query}
                        onChange={(e) => { setQuery(e.target.value); setShow(true); }}
                        onFocus={() => setShow(true)}
                        className="w-full bg-white/60 border border-gray-200 rounded-xl py-2.5 px-4 focus:bg-white focus:border-blue-400 transition-all text-sm text-gray-800 outline-none"
                    />
                    {show && (
                        <div className="searchable-results shadow-2xl">
                            {filtered.length > 0 ? (
                                filtered.map(opt => (
                                    <div key={opt} onClick={() => handleSelect(opt)} className="px-4 py-3 hover:bg-blue-50 cursor-pointer text-sm font-medium text-gray-700 border-b border-gray-50 last:border-0">
                                        {opt}
                                    </div>
                                ))
                            ) : (
                                allowCreate && query.length > 0 && (
                                    <div
                                        onClick={() => { onCreate(query); handleSelect(query); }}
                                        className="px-4 py-4 hover:bg-green-50 cursor-pointer text-sm font-black text-green-600 flex items-center gap-2"
                                    >
                                        <i data-lucide="plus-circle" className="w-4 h-4"></i>
                                        ¿No está? Registrar "{query}" como nueva Poza
                                    </div>
                                )
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const MultiSearchableSelect = ({ label, options, value = [], onChange, icon }) => {
            const [query, setQuery] = useState("");
            const [show, setShow] = useState(false);
            const containerRef = useRef(null);
            const filtered = options.filter(opt => opt.toLowerCase().includes(query.toLowerCase()) && !value.includes(opt));

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (containerRef.current && !containerRef.current.contains(event.target)) setShow(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const toggle = (opt) => {
                const updated = value.includes(opt) ? value.filter(x => x !== opt) : [...value, opt];
                onChange(updated);
            };

            return (
                <div className="mb-4 relative" ref={containerRef}>
                    <label className="block text-xs font-black text-gray-500 uppercase mb-1.5 flex items-center gap-2 tracking-widest leading-none">
                        {icon && <i data-lucide={icon} className="w-3.5 h-3.5 text-blue-500"></i>}
                        {label}
                    </label>
                    <div className="flex flex-wrap gap-1.5 mb-2">
                        {value.map(v => (
                            <span key={v} className="bg-blue-600 text-white text-[10px] font-black px-2.5 py-1.5 rounded-lg flex items-center gap-2 shadow-sm uppercase tracking-wider animate-fade-in">
                                {v}
                                <i data-lucide="x" className="w-3 h-3 cursor-pointer" onClick={() => toggle(v)}></i>
                            </span>
                        ))}
                    </div>
                    <input
                        type="text"
                        placeholder="Agregar equipos..."
                        value={query}
                        onChange={(e) => { setQuery(e.target.value); setShow(true); }}
                        onFocus={() => setShow(true)}
                        className="w-full bg-white/60 border border-gray-200 rounded-xl py-2.5 px-4 focus:bg-white focus:border-blue-400 transition-all text-sm outline-none"
                    />
                    {show && filtered.length > 0 && (
                        <div className="searchable-results shadow-2xl">
                            {filtered.map(opt => (
                                <div key={opt} onClick={() => { toggle(opt); setQuery(""); setShow(false); }} className="px-4 py-3 hover:bg-blue-50 cursor-pointer text-sm font-medium text-gray-700 border-b border-gray-50 last:border-0">
                                    {opt}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const EditableMeta = ({ value, onSave, unit = "h" }) => {
            const [editing, setEditing] = useState(false);
            const [val, setVal] = useState(value);

            React.useEffect(() => { setVal(value); }, [value]);

            if (editing) {
                return (
                    <input
                        type="number"
                        className="w-14 bg-gray-50 border border-gray-200 rounded px-1 py-0.5 text-[10px] font-black text-gray-700 outline-none focus:border-gray-400"
                        value={val}
                        onChange={e => setVal(e.target.value)}
                        onBlur={() => { setEditing(false); onSave(parseFloat(val) || 0); }}
                        onKeyDown={e => { if (e.key === 'Enter') { setEditing(false); onSave(parseFloat(val) || 0); } }}
                        autoFocus
                    />
                );
            }
            return (
                <span 
                    onClick={() => setEditing(true)} 
                    className="cursor-pointer hover:bg-gray-100 px-1 rounded transition-all text-gray-900 border-b border-dashed border-gray-300"
                >
                    {value || (value === 0 ? 0 : 100)}{unit}
                </span>
            );
        };

        const HistoryModal = ({ poza, records, metas = [], onSaveMeta, onDelete, onClose }) => {
            if (!poza) return null;

            const history = React.useMemo(() => {
                const seen = new Set();
                return records
                    .filter(r => r.Poza === poza)
                    .filter(r => {
                        const key = `${r.timestamp}_${r.Actividad}_${r.Porcentaje_Avance}`;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    })
                    .sort((a, b) => b.timestamp - a.timestamp);
            }, [records, poza]);

            const handlePrint = () => {
                const originalTitle = document.title;
                const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
                document.title = `Informe_${poza}_${dateStr}`;
                window.print();
                setTimeout(() => { document.title = originalTitle; }, 1000);
            };

            const firstDate = history.length > 0 ? history[history.length - 1].fecha : '-';
            const lastDate = history.length > 0 ? history[0].fecha : '-';
            const lastProgress = history.length > 0 ? history[0].Porcentaje_Avance : 0;

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [poza, metas]);

            return (
                <div className="fixed inset-0 bg-black/40 z-[9999] flex items-center justify-center p-4 print:p-0 print:bg-white print-modal-container">
                    <div className="bg-white rounded-xl w-full max-w-5xl max-h-[95vh] overflow-hidden flex flex-col border border-gray-200 print:border-none print:max-h-full print-content">

                        
                        <div className="p-5 border-b flex justify-between items-center print:border-b-2 bg-white">
                            <div className="flex flex-col">
                                <h2 className="text-xl font-bold text-blue-900 font-outfit uppercase tracking-tight leading-none">Reporte Histórico: {poza}</h2>
                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1">Trazabilidad de Control de Avance</p>
                            </div>
                            <div className="flex gap-2 no-print">
                                <button onClick={handlePrint} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-[9px] font-bold transition-all flex items-center gap-2 active:scale-95 uppercase tracking-wider">
                                    <i data-lucide="printer" className="w-3.5 h-3.5"></i> Exportar a PDF
                                </button>
                                <button onClick={onClose} className="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-[9px] font-bold transition-all active:scale-95 uppercase tracking-wider">Cerrar</button>
                            </div>
                        </div>

                        <div className="p-6 overflow-y-auto flex-1 bg-white print:p-10">
                            {/* Tarjetas de Resumen */}
                            <div className="grid grid-cols-3 gap-4 mb-8">
                                <div className="bg-white p-4 rounded-lg border border-gray-200">
                                    <p className="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Inicio</p>
                                    <p className="text-lg font-bold text-gray-800 tracking-tight">{firstDate}</p>
                                </div>
                                <div className="bg-white p-4 rounded-lg border border-gray-200">
                                    <p className="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Último Avance</p>
                                    <p className="text-lg font-bold text-gray-800 tracking-tight">{lastDate}</p>
                                </div>
                                <div className="bg-white p-4 rounded-lg border border-gray-200">
                                    <p className="text-[8px] text-gray-400 font-bold uppercase tracking-widest mb-1">Progreso</p>
                                    <p className={`text-lg font-bold tracking-tighter ${lastProgress === 100 ? 'text-green-600' : 'text-blue-600'}`}>{lastProgress}%</p>
                                </div>
                            </div>

                            {/* Tabla de Historial */}
                            <div className="border border-gray-200 rounded-lg overflow-hidden mb-12">
                                <table className="w-full text-left border-collapse table-fixed">
                                    <thead>
                                        <tr className="bg-gray-50 text-gray-500 border-b border-gray-200">
                                            <th className="w-[15%] px-4 py-3 text-[8px] font-bold uppercase tracking-widest">Fecha</th>
                                            <th className="w-[20%] px-4 py-3 text-[8px] font-bold uppercase tracking-widest">Actividad</th>
                                            <th className="w-[15%] px-4 py-3 text-[8px] font-bold uppercase tracking-widest text-center">Avance</th>
                                            <th className="w-[25%] px-4 py-3 text-[8px] font-bold uppercase tracking-widest">Equipos</th>
                                            <th className="w-[25%] px-4 py-3 text-[8px] font-bold uppercase tracking-widest">Observaciones</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100 text-[10px]">
                                        {history.map((r, i) => (
                                            <tr key={i} className="hover:bg-gray-50/50 transition-all">
                                                <td className="px-4 py-2.5 text-[10px] font-bold text-gray-900 tracking-tighter whitespace-nowrap">{r.fecha}</td>
                                                <td className="px-4 py-2.5 text-[10px] font-bold text-gray-600 uppercase tracking-tighter leading-tight break-words">{r.Actividad}</td>
                                                <td className="px-4 py-2.5">
                                                    <div className="flex flex-col items-center gap-1">
                                                        <span className="text-[9px] font-bold text-gray-900">{r.Porcentaje_Avance}%</span>
                                                        <div className="w-full h-1 bg-gray-100 rounded-full overflow-hidden">
                                                            <div className={`h-full ${r.Porcentaje_Avance === 100 ? 'bg-green-500' : 'bg-blue-500'}`} style={{ width: `${r.Porcentaje_Avance}%` }}></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-2.5">
                                                    <div className="flex flex-wrap gap-1">
                                                        {(r.EquiposDetalle || r.Equipos || []).map((item, j) => {
                                                            const name = typeof item === 'object' ? item.equipo : item;
                                                            return (
                                                                <span key={j} className="text-[7px] font-bold text-gray-500 bg-gray-50 border border-gray-100 px-1.5 py-0.5 rounded-sm uppercase tracking-tighter">
                                                                    {name.split(' (')[0]}
                                                                </span>
                                                            );
                                                        })}
                                                    </div>
                                                </td>
                                                <td className="px-4 py-2.5">
                                                    <p className="text-[9px] text-gray-500 leading-tight break-words">{r.Observaciones || "-"}</p>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Secciones de Presupuesto y Recursos */}
                            {(() => {
                                const equipmentTotals = {};
                                const groupedData = {};
                                
                                history.forEach(r => {
                                    const act = r.Actividad;
                                    const source = (r.EquiposDetalle && r.EquiposDetalle.length > 0)
                                        ? r.EquiposDetalle
                                        : (r.Equipos || []).map(e => ({ equipo: e, horas: 0 }));

                                    source.forEach(det => {
                                        const name = det.equipo;
                                        const hrs = parseFloat(det.horas) || 0;
                                        equipmentTotals[name] = (equipmentTotals[name] || 0) + hrs;
                                        const tipoMatch = name.match(/\(([^)]+)\)/);
                                        const tipo = tipoMatch ? tipoMatch[1] : "Otro";
                                        if (!groupedData[tipo]) groupedData[tipo] = {};
                                        groupedData[tipo][act] = (groupedData[tipo][act] || 0) + hrs;
                                    });
                                });

                                if (history.length === 0) return null;

                                return (
                                    <div className="space-y-12 split-print pb-10">
                                        {/* Control de Presupuesto */}
                                        <div>
                                            <div className="flex items-center gap-3 mb-6 px-3 border-l-2 border-blue-600">
                                                <div>
                                                    <h3 className="text-[8px] font-bold text-gray-400 uppercase tracking-widest leading-none mb-1">Presupuesto</h3>
                                                    <h4 className="text-sm font-bold text-gray-900 font-outfit uppercase">Control por Actividad</h4>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {Object.entries(groupedData).map(([tipo, acts]) => (
                                                    <div key={tipo} className="bg-white p-5 rounded-lg border border-gray-200">
                                                        <div className="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100">
                                                            <div className="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-gray-400 border border-gray-100">
                                                                <i data-lucide="package" className="w-4 h-4"></i>
                                                            </div>
                                                            <div className="flex flex-col">
                                                                <h3 className="text-[8px] font-bold text-gray-400 uppercase tracking-widest leading-none mb-1">Unidad</h3>
                                                                <h4 className="text-[10px] font-bold text-gray-800 uppercase">{tipo}</h4>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="space-y-6">
                                                            {Object.entries(acts).sort((a,b) => b[1] - a[1]).map(([act, hrs]) => {
                                                                const metaObj = metas.find(m => m.Poza === poza && m.Actividad === act && m.TipoEquipo === tipo);
                                                                const metaVal = metaObj ? parseFloat(metaObj.Meta) : 100;
                                                                const pct = metaVal > 0 ? Math.round((hrs / metaVal) * 100) : 0;
                                                                const color = pct >= 100 ? 'bg-red-500' : (pct >= 80 ? 'bg-yellow-500' : 'bg-blue-600');
                                                                const textColor = pct >= 100 ? 'text-red-600' : (pct >= 80 ? 'text-yellow-600' : 'text-blue-600');

                                                                return (
                                                                    <div key={act}>
                                                                        <div className="flex justify-between items-end mb-1.5">
                                                                            <div className="flex flex-col">
                                                                                <span className="text-[9px] font-bold text-blue-600 uppercase tracking-tight">{act}</span>
                                                                                <span className="text-base font-bold text-gray-900 tracking-tighter">{hrs}h</span>
                                                                            </div>
                                                                            <div className="text-right">
                                                                                <p className={`text-xs font-bold ${textColor}`}>{pct}%</p>
                                                                                <p className="text-[7px] font-bold text-gray-400 uppercase tracking-widest">
                                                                                    Meta: <EditableMeta value={metaVal} onSave={(v) => onSaveMeta(act, tipo, v)} />
                                                                                </p>
                                                                            </div>
                                                                        </div>
                                                                        <div className="w-full h-1.5 bg-gray-50 rounded-full overflow-hidden border border-gray-100">
                                                                            <div className={`h-full ${color} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${Math.min(100, pct)}%` }}></div>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Recursos Utilizados */}
                                        <div>
                                            <div className="flex items-center gap-3 mb-6 px-3 border-l-2 border-blue-600">
                                                <div>
                                                    <h3 className="text-[8px] font-bold text-gray-400 uppercase tracking-widest leading-none mb-1">Resumen Global</h3>
                                                    <h4 className="text-sm font-bold text-gray-900 font-outfit uppercase">Recursos Utilizados</h4>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                {Object.entries(equipmentTotals).sort((a,b) => b[1] - a[1]).map(([name, hrs]) => (
                                                    <div key={name} className="flex justify-between items-center p-3.5 bg-white rounded-lg border border-gray-200">
                                                        <div className="flex flex-col min-w-0">
                                                            <span className="text-[8px] font-bold text-gray-400 uppercase tracking-widest truncate">{name.split(' (')[1]?.replace(')','') || 'Equipo'}</span>
                                                            <span className="text-[10px] font-bold text-gray-800 truncate uppercase">{name.split(' (')[0]}</span>
                                                        </div>
                                                        <div className="flex items-center justify-center min-w-[35px] h-8 bg-gray-50 rounded border border-gray-100 ml-2">
                                                            <span className="text-[10px] font-bold text-gray-900">{hrs}h</span>
                                                        </div>
                                                    </div>
                                                ))}
                                                {Object.keys(equipmentTotals).length === 0 && (
                                                    <p className="col-span-full text-[9px] text-gray-400 italic font-bold uppercase tracking-widest py-4 text-center border border-dashed rounded-lg">No hay horas registradas aún.</p>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* Footer de Impresión */}
                            <div className="mt-12 text-center hidden print:block border-t border-dashed pt-10">
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-[0.4em] opacity-50">Reporte de Uso Interno - Proyecto Salar de Atacama | Excon S.A</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        const Login = ({ onLogin }) => {
            const [user, setUser] = useState("");
            const [pass, setPass] = useState("");

            const handleLogin = (e) => {
                e.preventDefault();
                const users = storage.get('pozas_users', INITIAL_USERS);
                const found = users.find(u => u.user === user && u.pass === pass);
                if (found) onLogin(found);
                else alert("Credenciales incorrectas");
            };

            return (
                <div className="min-h-screen flex items-center justify-center login-bg p-6">
                    <div className="absolute inset-0 bg-blue-900/40 backdrop-blur-sm"></div>
                    <GlassCard className="max-w-md w-full relative z-10 !bg-white/90 shadow-2xl">
                        <div className="text-center mb-10">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl mx-auto mb-6 transform rotate-6 border-4 border-white">
                                <i data-lucide="hard-hat" className="w-8 h-8 text-white"></i>
                            </div>
                            <h1 className="text-4xl font-black text-gray-900 tracking-tight mb-2 font-outfit">Pozas Control</h1>
                            <p className="text-gray-500 font-bold text-[10px] uppercase tracking-[0.3em]">Excon S.A | Update</p>
                        </div>
                        <form onSubmit={handleLogin}>
                            <Input label="Usuario" icon="user" value={user} onChange={e => setUser(e.target.value)} />
                            <Input label="Contraseña" icon="lock" type="password" value={pass} onChange={e => setPass(e.target.value)} />
                            <button className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 mt-6 uppercase text-xs tracking-[0.2em]">
                                Ingresar
                            </button>
                        </form>
                    </GlassCard>
                </div>
            );
        };

        const DashboardView = ({ records, onEdit, onDelete, currentUser, setSelectedPozaHist }) => {
            const canEdit = can(currentUser, 'editar_registros');
            const canDelete = can(currentUser, 'borrar_registros');
            const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);
            const [filterEndDate, setFilterEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [filterPoza, setFilterPoza] = useState("Todas");
            const [filterAct, setFilterAct] = useState("Todas");
            const [filterEquip, setFilterEquip] = useState("Todas");

            const setQuickRange = (range) => {
                const today = new Date();
                const end = today.toISOString().split('T')[0];
                let start = end;
                if (range === '7d') {
                    const d = new Date(); d.setDate(today.getDate() - 7);
                    start = d.toISOString().split('T')[0];
                } else if (range === 'month') {
                    start = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
                }
                setFilterDate(start);
                setFilterEndDate(end);
            };

            const periodRecords = records.filter(r => r.fecha >= filterDate && r.fecha <= filterEndDate);

            const displayRecords = [...periodRecords].sort((a, b) => b.timestamp - a.timestamp);

            const availablePozas = ["Todas", ...new Set(displayRecords.map(r => r.Poza))].sort();
            const availableActs = ["Todas", ...new Set(displayRecords.map(r => r.Actividad))].sort();
            const availableEquips = ["Todas", ...new Set(displayRecords.flatMap(r => r.Equipos))].sort();

            const filtered = displayRecords.filter(r => {
                const matchPoza = filterPoza === "Todas" || r.Poza === filterPoza;
                const matchAct = filterAct === "Todas" || r.Actividad === filterAct;
                const matchEquip = filterEquip === "Todas" || r.Equipos.includes(filterEquip);
                return matchPoza && matchAct && matchEquip;
            });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [filterDate, filterEndDate, filterPoza, filterAct, filterEquip, records, filtered]);

            return (
                <div className="space-y-6 animate-fade-in">
                    <GlassCard className="flex flex-col gap-6">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <h2 className="text-2xl font-black text-gray-900 font-outfit">Dashboard de Programación</h2>
                                <p className="text-gray-500 text-xs font-bold uppercase tracking-widest leading-none mt-1">Monitoreo de avances diario.</p>
                            </div>
                            <div className="flex flex-wrap gap-4 items-end mb-6">
                                <div className="flex-1 min-w-[300px] flex gap-2 items-end">
                                    <div className="flex-1">
                                        <label className="block text-[10px] text-gray-500 font-black mb-1 uppercase tracking-wider">Desde / Hasta</label>
                                        <div className="flex gap-2">
                                            <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="w-full bg-gray-100 border border-blue-100 rounded-xl px-3 py-2 text-blue-900 text-sm font-bold ring-offset-2 focus:ring-2 focus:ring-blue-500" />
                                            <input type="date" value={filterEndDate} onChange={e => setFilterEndDate(e.target.value)} className="w-full bg-gray-100 border border-blue-100 rounded-xl px-3 py-2 text-blue-900 text-sm font-bold ring-offset-2 focus:ring-2 focus:ring-blue-500" />
                                        </div>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => setQuickRange('today')} className="bg-blue-600 hover:bg-blue-700 text-[10px] text-white font-black px-4 py-2.5 rounded-xl shadow-md transition-all active:scale-95 uppercase">Hoy</button>
                                        <button onClick={() => setQuickRange('7d')} className="bg-blue-600 hover:bg-blue-700 text-[10px] text-white font-black px-4 py-2.5 rounded-xl shadow-md transition-all active:scale-95 uppercase">7 Días</button>
                                        <button onClick={() => setQuickRange('month')} className="bg-blue-600 hover:bg-blue-700 text-[10px] text-white font-black px-4 py-2.5 rounded-xl shadow-md transition-all active:scale-95 uppercase">Mes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t border-gray-100">
                            <Select label="Filtrar Poza" options={availablePozas} value={filterPoza} onChange={e => setFilterPoza(e.target.value)} icon="map-pin" />
                            <Select label="Filtrar Actividad" options={availableActs} value={filterAct} onChange={e => setFilterAct(e.target.value)} icon="activity" />
                            <Select label="Filtrar Equipo" options={availableEquips} value={filterEquip} onChange={e => setFilterEquip(e.target.value)} icon="truck" />
                        </div>
                    </GlassCard>

                    {/* Vista para Escritorio (Tabla) */}
                    <div className="hidden md:block overflow-x-auto rounded-3xl bg-white/30 backdrop-blur-lg border border-white/40 shadow-xl">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="text-[10px] font-black text-gray-500 uppercase tracking-widest bg-gray-100/50">
                                    <th className="px-6 py-4">Sincronización</th>
                                    <th className="px-6 py-4">Poza</th>
                                    <th className="px-6 py-4">Actividad</th>
                                    <th className="px-6 py-4">Avance (%)</th>
                                    <th className="px-6 py-4">Equipos</th>
                                    <th className="px-6 py-4">Responsable</th>
                                    <th className="px-6 py-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.length > 0 ? filtered.map((r) => (
                                    <tr key={r.timestamp} className="border-b border-white/20 hover:bg-white/40 transition-all group cursor-pointer" onClick={() => setSelectedPozaHist(r.Poza)}>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-green-500 shadow-lg shadow-green-200"></div>
                                                <p className="text-[10px] font-bold text-gray-400">{new Date(r.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 font-black text-blue-600 font-outfit text-lg">
                                            {r.Poza}
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-2 group relative">
                                                <span className="text-xs font-black text-gray-700 uppercase tracking-tight">{r.Actividad}</span>
                                                {r.Observaciones && r.Observaciones.trim() !== "" && (
                                                    <div className="relative">
                                                        <i data-lucide="message-square" className="w-3.5 h-3.5 text-blue-500 cursor-help opacity-70 hover:opacity-100 transition-all"></i>
                                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 p-2.5 bg-gray-900/95 text-white text-[10px] font-medium leading-tight rounded-xl shadow-2xl z-[9999] backdrop-blur-md border border-gray-700/50">
                                                            <p className="opacity-90">{r.Observaciones}</p>
                                                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900/95"></div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 text-sm font-black ${r.Porcentaje_Avance === 100 ? 'text-green-600' : 'text-blue-600'}`}>{r.Porcentaje_Avance}%</div>
                                                <div className="flex-1 min-w-[80px] h-1.5 bg-gray-200/50 rounded-full overflow-hidden">
                                                    <div className={`h-full ${r.Porcentaje_Avance === 100 ? 'bg-green-500' : 'bg-blue-500'} rounded-full`} style={{ width: `${r.Porcentaje_Avance}%` }}></div>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className="flex flex-wrap gap-1">
                                                {r.Equipos.map(e => <span key={e} className="text-[8px] bg-white border border-gray-100 px-2 py-0.5 rounded-full shadow-sm font-black text-gray-400 uppercase tracking-tighter">{e.split(' (')[0]}</span>)}
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 text-xs">
                                            <p className="font-black text-gray-900 uppercase leading-none">{r.userName}</p>
                                            <p className="text-[8px] text-gray-400 font-bold uppercase tracking-widest mt-1">{r.userCargo}</p>
                                        </td>
                                        <td className="px-6 py-4 text-right">
                                            <div className="flex justify-end gap-2" onClick={(e) => e.stopPropagation()}>
                                                {canEdit && <button onClick={() => onEdit(r)} className="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i data-lucide="edit-3" className="w-4 h-4"></i></button>}
                                                {canDelete && <button onClick={() => onDelete(r.timestamp)} className="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>}
                                            </div>
                                        </td>
                                    </tr>
                                )) : (
                                    <tr>
                                        <td colSpan="7" className="px-6 py-20 text-center opacity-40 font-black text-xl italic uppercase tracking-widest">Sin registros para hoy.</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    {/* Vista para Móviles (Tarjetas) */}
                    <div className="block md:hidden space-y-4">
                        {filtered.length > 0 ? filtered.map((r) => (
                            <GlassCard key={r.timestamp} className="!p-5 space-y-4 cursor-pointer active:scale-[0.98] transition-all" onClick={() => setSelectedPozaHist(r.Poza)}>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl font-black text-blue-600 font-outfit">
                                            {r.Poza}
                                        </h3>
                                        <div className="flex items-center gap-1.5 group relative">
                                            <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">{r.Actividad}</p>
                                            {r.Observaciones && r.Observaciones.trim() !== "" && (
                                                <div className="relative">
                                                    <i data-lucide="message-square" className="w-3.5 h-3.5 text-blue-500 cursor-help"></i>
                                                    <div className="absolute bottom-full left-0 mb-2 hidden group-hover:block w-48 p-2.5 bg-gray-900/95 text-white text-[10px] font-medium leading-tight rounded-xl shadow-2xl z-[9999] backdrop-blur-md border border-gray-700/50">
                                                        <p className="opacity-90">{r.Observaciones}</p>
                                                        <div className="absolute top-full left-4 border-4 border-transparent border-t-gray-900/95"></div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-1.5 bg-green-50 px-2 py-1 rounded-lg">
                                        <div className="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                                        <span className="text-[10px] font-bold text-green-600 italic">{new Date(r.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                    </div>
                                </div>

                                <div className="space-y-1.5">
                                    <div className="flex justify-between text-[10px] font-black uppercase tracking-widest">
                                        <span className="text-gray-400">Avance del día</span>
                                        <span className={r.Porcentaje_Avance === 100 ? 'text-green-600' : 'text-blue-600'}>{r.Porcentaje_Avance}%</span>
                                    </div>
                                    <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                        <div className={`h-full ${r.Porcentaje_Avance === 100 ? 'bg-green-500' : 'bg-blue-500'} rounded-full transition-all`} style={{ width: `${r.Porcentaje_Avance}%` }}></div>
                                    </div>
                                </div>

                                <div className="flex flex-wrap gap-1">
                                    {r.Equipos.map(e => <span key={e} className="text-[8px] bg-white border border-gray-100 px-2 py-1 rounded-md font-black text-gray-400 uppercase tracking-tighter shadow-sm">{e.split(' (')[0]}</span>)}
                                </div>

                                <div className="pt-3 border-t border-gray-100 flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-black text-gray-900 uppercase leading-none">{r.userName}</p>
                                        <p className="text-[8px] text-gray-400 font-bold uppercase tracking-widest">{r.userCargo}</p>
                                    </div>
                                    <div className="flex gap-2" onClick={(e) => e.stopPropagation()}>
                                        {canEdit && <button onClick={() => onEdit(r)} className="p-2.5 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><i data-lucide="edit-3" className="w-4 h-4"></i></button>}
                                        {canDelete && <button onClick={() => onDelete(r.timestamp)} className="p-2.5 bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>}
                                    </div>
                                </div>
                            </GlassCard>
                        )) : (
                            <div className="py-12 text-center opacity-40 font-black text-lg italic uppercase tracking-widest bg-white/20 rounded-3xl border border-dashed border-white/50">Sin registros para hoy.</div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminPanel = ({ users, setUsers, syncRecords }) => {
            const [editingUser, setEditingUser] = useState(null);
            const [userForm, setUserForm] = useState({ user: '', pass: '', name: '', cargo: '', telefono: '', mail: '', permisos: { ...PERMISOS_DEFAULT } });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [users]);

            const handleSaveUser = async (e) => {
                e.preventDefault();
                if (!userForm.user || !userForm.pass || !userForm.name) return alert("Completa los campos obligatorios");

                let updated;
                if (editingUser !== null) {
                    updated = users.map((u, i) => i === editingUser ? userForm : u);
                } else {
                    updated = [...users, userForm];
                }

                setUsers(updated);
                storage.set('pozas_users', updated);
                await api.send('insert_usuario', { ...userForm, permisos: JSON.stringify(userForm.permisos) });

                // Retraso aumentado para mayor seguridad con Google Sheets
                setTimeout(() => syncRecords(), 3000);

                setUserForm({ user: '', pass: '', name: '', cargo: '', telefono: '', mail: '', permisos: { ...PERMISOS_DEFAULT } });
                setEditingUser(null);
                alert("Usuario sincronizado con éxito.");
            };

            const handleDeleteUser = async (u, i) => {
                if (!confirm(`¿Borrar a ${u.name}?`)) return;
                const filtered = users.filter((_, idx) => idx !== i);
                setUsers(filtered);
                storage.set('pozas_users', filtered);
                await api.send('delete_usuario', { user: u.user });
                setTimeout(() => syncRecords(), 2000); // Sincronización con retraso
            };

            const startEdit = (user, index) => {
                setUserForm(user);
                setEditingUser(index);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fade-in">
                    <GlassCard>
                        <h2 className="text-2xl font-black mb-6 flex items-center gap-3 font-outfit">
                            <i data-lucide={editingUser !== null ? "edit-3" : "user-plus"} className="text-blue-500"></i>
                            {editingUser !== null ? "Modificar Perfil" : "Registrar Nuevo Usuario"}
                        </h2>
                        <form onSubmit={handleSaveUser} className="space-y-1">
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Nombre Completo" value={userForm.name} onChange={e => setUserForm({ ...userForm, name: e.target.value })} />
                                <div className="mb-4">
                                    <label className="block text-xs font-black text-gray-500 uppercase mb-1.5 tracking-widest">Preset de Permisos</label>
                                    <div className="flex flex-wrap gap-2">
                                        {Object.entries({ 'Admin': 'admin', 'Programador': 'programador', 'Supervisor': 'supervisor', 'Solo Vista': 'solo_vista' }).map(([label, key]) => (
                                            <button key={key} type="button" onClick={() => setUserForm({ ...userForm, permisos: { ...PRESETS[key] } })} className="px-3 py-1.5 text-[9px] font-black uppercase tracking-widest rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-600 hover:text-white transition-all">{label}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="mb-4">
                                <label className="block text-xs font-black text-gray-500 uppercase mb-2 tracking-widest">Permisos Individuales</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {[
                                        { key: 'ver_ingreso', label: 'Ver Ingreso' },
                                        { key: 'escribir_ingreso', label: 'Escribir en Ingreso' },
                                        { key: 'ver_dashboard', label: 'Ver Dashboard' },
                                        { key: 'editar_registros', label: 'Editar Registros' },
                                        { key: 'borrar_registros', label: 'Borrar Registros' },
                                        { key: 'gestionar_usuarios', label: 'Gestionar Usuarios' }
                                    ].map(({ key, label }) => (
                                        <label key={key} className="flex items-center gap-3 p-3 bg-white/60 rounded-xl border border-gray-100 cursor-pointer hover:border-blue-300 transition-all">
                                            <input type="checkbox" checked={userForm.permisos?.[key] || false} onChange={e => setUserForm({ ...userForm, permisos: { ...(userForm.permisos || PERMISOS_DEFAULT), [key]: e.target.checked } })} className="w-4 h-4 accent-blue-600 cursor-pointer" />
                                            <span className="text-[10px] font-black uppercase text-gray-600 tracking-wider">{label}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Cargo" value={userForm.cargo} onChange={e => setUserForm({ ...userForm, cargo: e.target.value })} />
                                <Input label="Teléfono" value={userForm.telefono} onChange={e => setUserForm({ ...userForm, telefono: e.target.value })} />
                            </div>
                            <Input label="Email Corporativo" type="email" value={userForm.mail} onChange={e => setUserForm({ ...userForm, mail: e.target.value })} />
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Usuario" value={userForm.user} onChange={e => setUserForm({ ...userForm, user: e.target.value })} />
                                <Input label="Contraseña" type="text" value={userForm.pass} onChange={e => setUserForm({ ...userForm, pass: e.target.value })} />
                            </div>
                            <div className="flex gap-4 mt-6">
                                <button type="submit" className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl hover:bg-blue-700 transition-all active:scale-95">
                                    {editingUser !== null ? "Guardar Cambios" : "Crear Usuario"}
                                </button>
                                {editingUser !== null && (
                                    <button type="button" onClick={() => { setEditingUser(null); setUserForm({ user: '', pass: '', name: '', cargo: '', telefono: '', mail: '', permisos: { ...PERMISOS_DEFAULT } }); }} className="px-6 bg-gray-200 text-gray-600 rounded-2xl font-black uppercase text-xs">Cancelar</button>
                                )}
                            </div>
                        </form>
                    </GlassCard>

                    <GlassCard>
                        <h2 className="text-2xl font-black mb-6 flex items-center gap-3 font-outfit">
                            <i data-lucide="users" className="text-indigo-500"></i> Directorio de Personal
                        </h2>
                        <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-range">
                            {users.map((u, i) => (
                                <div key={i} className="p-4 bg-white/40 border border-white/60 rounded-2xl flex justify-between items-center group cursor-pointer hover:border-blue-400 shadow-sm transition-all" onClick={() => startEdit(u, i)}>
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black shadow-md group-hover:scale-105 transition-transform">
                                            {u.name.charAt(0)}
                                        </div>
                                        <div>
                                            <p className="font-black text-gray-900 leading-none mb-1 uppercase text-sm">{u.name}</p>
                                            <p className="text-[9px] text-gray-500 font-bold uppercase tracking-widest">{u.cargo} | {getPresetName(u.permisos)}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={(e) => {
                                            e.stopPropagation();
                                            handleDeleteUser(u, i);
                                        }} className="w-8 h-8 rounded-lg flex items-center justify-center text-red-200 hover:text-red-500 hover:bg-red-50 transition-all">
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </GlassCard>
                </div>
            );
        };
        const App = () => {
            const [users, setUsers] = useState(storage.get('pozas_users', INITIAL_USERS));
            const [currentUser, setCurrentUser] = useState(storage.get('pozas_session', null));
            const [view, setView] = useState(currentUser && !can(currentUser, 'ver_ingreso') && can(currentUser, 'ver_dashboard') ? 'dashboard' : 'form');
            const [maestro, setMaestro] = useState(storage.get('pozas_maestro', DEFAULT_MAESTRO));
            const [records, setRecords] = useState(storage.get('pozas_records', []));
            const [metas, setMetas] = useState(storage.get('pozas_metas', []));
            const lastMetasUpdate = React.useRef(0);
            const [saving, setSaving] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            const [selectedPozaHist, setSelectedPozaHist] = useState(null);

            const [formData, setFormData] = useState({
                fecha: new Date().toISOString().split('T')[0],
                Poza: '',
                Actividad: '',
                Porcentaje_Avance: 0,
                Equipos: [],
                EquiposDetalle: [], // [{ equipo: '...', horas: 0 }]
                tipoEquipo: 'Todos',
                Observaciones: ''
            });
            const [prevProgress, setPrevProgress] = useState(0);

            const [loading, setLoading] = useState(true);

            const syncRecords = async (showLoading = false) => {
                if (showLoading) setLoading(true);
                try {
                    // 1. Usuarios
                    const cloudUsers = await api.listUsers();
                    if (cloudUsers && cloudUsers.length > 0) {
                        setUsers(cloudUsers);
                        storage.set('pozas_users', cloudUsers);
                    }
                    // 2. Maestro
                    const cloudMaestro = await api.listMaestro();
                    if (cloudMaestro && typeof cloudMaestro === 'object') {
                        setMaestro(prev => ({
                            ...prev,
                            Poza: (cloudMaestro.Poza?.length > 0) ? cloudMaestro.Poza : prev.Poza,
                            Equipo: (cloudMaestro.Equipo?.length > 0) ? cloudMaestro.Equipo : prev.Equipo,
                            Actividad: (cloudMaestro.Actividad?.length > 0) ? cloudMaestro.Actividad : prev.Actividad,
                            TiposEquipos: (cloudMaestro.TiposEquipos?.length > 0) ? cloudMaestro.TiposEquipos : prev.TiposEquipos
                        }));
                    }
                    // 3. Registros
                    const cloudRecords = await api.list();
                    if (cloudRecords && cloudRecords.length > 0) {
                        setRecords(cloudRecords);
                        storage.set('pozas_records', cloudRecords);
                    }
                    // 4. Metas (Skip if recently updated manually window of 5s)
                    if (Date.now() - lastMetasUpdate.current > 5000) {
                        const cloudMetas = await api.listMetas();
                        if (cloudMetas && Array.isArray(cloudMetas)) {
                            setMetas(cloudMetas);
                            storage.set('pozas_metas', cloudMetas);
                        }
                    }
                } catch (e) { console.error("Sync Error:", e); }
                if (showLoading) setLoading(false);
            };

            useEffect(() => {
                syncRecords(true);
                const syncInterval = setInterval(() => syncRecords(false), 30000);
                return () => clearInterval(syncInterval);
            }, [currentUser, view]);

            useEffect(() => {
                if (formData.Poza && formData.Actividad) {
                    const last = records
                        .filter(r => r.Poza === formData.Poza && r.Actividad === formData.Actividad)
                        .sort((a, b) => b.timestamp - a.timestamp)[0];
                    const lastVal = last ? last.Porcentaje_Avance : 0;
                    setPrevProgress(lastVal);

                    // Solo inicializar si no estamos editando un registro existente
                    if (!editingRecord) {
                        setFormData(prev => ({ ...prev, Porcentaje_Avance: lastVal }));
                    }
                }
            }, [formData.Poza, formData.Actividad]); // Solo disparamos cuando cambia la selección, no con cada sync de records

            // Efecto para sincronizar EquiposDetalle cuando cambia Equipos
            useEffect(() => {
                const currentEquipos = formData.Equipos || [];
                const currentDetalle = formData.EquiposDetalle || [];

                // Mantener los que siguen estando seleccionados
                let newDetalle = currentDetalle.filter(d => currentEquipos.includes(d.equipo));

                // Agregar los nuevos que no estaban en detalle
                currentEquipos.forEach(e => {
                    if (!newDetalle.find(d => d.equipo === e)) {
                        newDetalle.push({ equipo: e, horas: 0 });
                    }
                });

                // Solo actualizar si realmente cambió algo (evitar loops)
                if (JSON.stringify(newDetalle) !== JSON.stringify(currentDetalle)) {
                    setFormData(prev => ({ ...prev, EquiposDetalle: newDetalle }));
                }
            }, [formData.Equipos]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [formData, maestro, view, saving]);

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('pozas_session');
            };

            const handleLogin = (user) => {
                setCurrentUser(user);
                storage.set('pozas_session', user);
                setView(!can(user, 'ver_ingreso') && can(user, 'ver_dashboard') ? 'dashboard' : 'form');
            };

            const createNewPoza = async (name) => {
                const updatedPonds = [...maestro.Poza, name].sort();
                setMaestro({ ...maestro, Poza: updatedPonds });
                await api.send('insert_maestro', { tipo: 'Poza', valor: name });
                setTimeout(() => syncRecords(), 2000);
            };

            const deleteRecord = async (ts) => {
                if (!confirm("¿Seguro de borrar este registro?")) return;
                const updated = records.filter(r => r.timestamp !== ts);
                setRecords(updated);
                storage.set('pozas_records', updated);
                await api.send('delete', { timestamp: ts });
                setTimeout(() => syncRecords(), 2000);
            };

            const editRecord = (rec) => {
                setFormData({
                    ...rec,
                    tipoEquipo: 'Todos',
                    Observaciones: rec.Observaciones || '',
                    EquiposDetalle: rec.EquiposDetalle || (rec.Equipos ? rec.Equipos.map(e => ({ equipo: e, horas: 0 })) : [])
                });
                setEditingRecord(rec.timestamp);
                setView('form');
            };

            const saveAvance = async () => {
                if (!formData.Poza || !formData.Actividad || !formData.fecha) return alert("Fecha, Poza y Actividad son obligatorias");
                if (saving) return;

                setSaving(true);
                try {
                    // Buscar si ya existe un registro para esta Poza, Actividad y Fecha (para evitar duplicados)
                    // Usamos trim() y toLowerCase() para que la comparación sea a prueba de espacios o mayúsculas/minúsculas
                    const targetPoza = formData.Poza.toString().trim().toLowerCase();
                    const targetAct = formData.Actividad.toString().trim().toLowerCase();
                    const targetFecha = formData.fecha.toString().trim();

                    const existingRecord = records.find(r => 
                        r.Poza.toString().trim().toLowerCase() === targetPoza && 
                        r.Actividad.toString().trim().toLowerCase() === targetAct && 
                        r.fecha.toString().trim() === targetFecha
                    );

                    const timestamp = editingRecord || (existingRecord ? existingRecord.timestamp : new Date().getTime());
                    const isUpdate = !!(editingRecord || existingRecord);

                    const newRecord = {
                        ...formData,
                        userName: currentUser.name,
                        userRole: currentUser.role,
                        userCargo: currentUser.cargo,
                        timestamp: timestamp
                    };

                    // Optimistic update
                    let updated;
                    if (isUpdate) {
                        updated = records.map(r => r.timestamp === timestamp ? newRecord : r);
                        await api.send('update', newRecord);
                        setEditingRecord(null);
                    } else {
                        updated = [newRecord, ...records];
                        await api.send('insert', newRecord);
                    }

                    setRecords(updated);
                    storage.set('pozas_records', updated);
